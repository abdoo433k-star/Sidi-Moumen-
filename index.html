<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ترتيب أحياء سيدي مومن | Sidi Moumen Ranking</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="container">
      <div class="header-content">
        <div class="logo">🏘️</div>
        <div class="header-title">
          <h1>ترتيب أحياء سيدي مومن</h1>
          <p>منصة تفاعلية لتقييم وترتيب أحياء المنطقة</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Stats Grid -->
    <div class="stats-section" id="statsGrid">
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">إجمالي الأصوات</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">عدد الأحياء</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">متوسط الأصوات</div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="main-content">
      <!-- Leaderboard -->
      <section class="leaderboard-section">
        <h2 class="section-title">🏆 ترتيب الأحياء الحالي</h2>
        <div id="leaderboard" class="loading">جاري تحميل البيانات...</div>
      </section>

      <!-- Vote Form -->
      <aside class="vote-form-section">
        <h2 class="section-title">🗳️ صوّت الآن</h2>
        <div id="voteMessage"></div>
        <form id="voteForm">
          <div class="form-group">
            <label for="residenceNeighborhood">🏠 أنت تسكن في:</label>
            <select id="residenceNeighborhood" required>
              <option value="">-- اختر حيك --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="voteNeighborhood">❤️ صوّت للحي:</label>
            <select id="voteNeighborhood" required>
              <option value="">-- اختر الحي الذي تريد التصويت له --</option>
            </select>
          </div>

          <!-- reCAPTCHA -->
          <div class="form-group">
            <div class="g_recaptcha_badge" data-sitekey="YOUR_RECAPTCHA_SITE_KEY">
              <div class="g_recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>
            </div>
          </div>

          <button type="submit" class="btn-vote">صوّت الآن 🗳️</button>
        </form>

        <!-- Share Section -->
        <div style="margin-top: 30px; padding-top: 30px; border-top: 2px solid #f0f0f0;">
          <h3 class="section-title" style="font-size: 16px;">📢 شارك النتائج</h3>
          <div class="share-buttons">
            <button class="share-btn twitter" onclick="shareOnTwitter()">𝕏</button>
            <button class="share-btn whatsapp" onclick="shareOnWhatsApp()">💬</button>
            <button class="share-btn facebook" onclick="shareOnFacebook()">f</button>
            <button class="share-btn copy" onclick="copyLink()">📋</button>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>✨ منصة تفاعلية لأحياء سيدي مومن | صُنعت بـ ❤️ من قبل المجتمع</p>
    <p style="margin-top: 10px; font-size: 12px; opacity: 0.8;">© 2026 جميع الحقوق محفوظة</p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
